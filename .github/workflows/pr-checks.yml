name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Code Scan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download animation PCK from Godot library (latest release)
        run: |
          mkdir -p app/src/main/assets
          if gh release download \
            --repo "${{ github.repository_owner }}/Android-Godot-Futoshiki-library" \
            --pattern "data.pck" \
            --dir app/src/main/assets/ \
            --clobber 2>/dev/null; then
            echo "Animation PCK downloaded: $(du -sh app/src/main/assets/data.pck | cut -f1)"
          else
            echo "WARNING: Could not download animation PCK — linting without it"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download animation PCK from Godot library (latest release)
        run: |
          mkdir -p app/src/main/assets
          if gh release download \
            --repo "${{ github.repository_owner }}/Android-Godot-Futoshiki-library" \
            --pattern "data.pck" \
            --dir app/src/main/assets/ \
            --clobber 2>/dev/null; then
            echo "Animation PCK downloaded: $(du -sh app/src/main/assets/data.pck | cut -f1)"
          else
            echo "WARNING: Could not download animation PCK — building without it"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pr-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
